<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodExpress Register</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ===== BODY ===== */

body{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url('https://images.unsplash.com/photo-1550547660-d9450f859349');

    background-size:cover;
    background-position:center;
}

/* ===== REGISTER CARD ===== */

.card{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);

    padding:40px 30px;

    border-radius:22px;

    box-shadow:0 20px 50px rgba(0,0,0,0.35);

    text-align:center;
}

/* ===== LOGO ===== */

.logo{
    font-size:34px;
    font-weight:800;
    color:#ff4d4d;

    margin-bottom:10px;
}

/* ===== TITLE ===== */

.card h2{
    font-size:28px;
    color:#111;

    margin-bottom:8px;
}

.card p{
    color:#666;
    font-size:14px;

    margin-bottom:25px;
}

/* ===== INPUT BOX ===== */

.input-box{
    position:relative;
    margin-bottom:18px;
}

.input-box input{
    width:100%;

    padding:14px 14px 14px 48px;

    border:1px solid #ddd;
    border-radius:12px;

    background:#f8f8f8;

    outline:none;

    font-size:15px;

    transition:0.3s;
}

.input-box input:focus{
    border-color:#ff4d4d;
    box-shadow:0 0 8px rgba(255,77,77,0.2);
}

.input-box i{
    position:absolute;

    left:16px;
    top:50%;

    transform:translateY(-50%);

    color:#777;
}

/* ===== BUTTON ===== */

.register-btn{
    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#ff4d4d,#e63939);

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.register-btn:hover{
    transform:translateY(-2px);
}

/* ===== LOGIN LINK ===== */

.login-link{
    margin-top:20px;

    color:#666;
    font-size:14px;
}

.login-link a{
    color:#ff4d4d;
    text-decoration:none;
    font-weight:700;
}

/* ===== RESPONSIVE ===== */

@media(max-width:480px){

    .card{
        padding:35px 25px;
    }

    .card h2{
        font-size:24px;
    }

}

</style>
</head>

<body>

<!-- REGISTER CARD -->

<div class="card">

    <!-- LOGO -->

    <div class="logo">
        🍔 FoodExpress
    </div>

    <!-- TITLE -->

    <h2>Create Account ✨</h2>

    <p>Join FoodExpress & enjoy delicious food</p>

    <!-- FORM -->

    <form action="index.html">

        <!-- FULL NAME -->

        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input type="text"
            placeholder="Enter your full name"
            required>

        </div>

        <!-- EMAIL -->

        <div class="input-box">

            <i class="fa-solid fa-envelope"></i>

            <input type="email"
            placeholder="Enter your email"
            required>

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input type="password"
            placeholder="Create password"
            required>

        </div>

        <!-- CONFIRM PASSWORD -->

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input type="password"
            placeholder="Confirm password"
            required>

        </div>

        <!-- REGISTER BUTTON -->

        <button type="submit" class="register-btn">
            Create Account
        </button>

    </form>

    <!-- LOGIN -->

    <div class="login-link">

        Already have an account?

        <a href="login.html">
            Login
        </a>

    </div>

</div>

</body>
</html>

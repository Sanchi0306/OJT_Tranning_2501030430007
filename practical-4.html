<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet" href="pr-4.css">

<!-- Internal CSS -->
<style>
.subtitle{
    text-align:center;
    color:#eca3a3;
    margin-bottom:15px;
}
</style>

</head>
<body>

<div class="layout">

    <!-- HEADER -->
    <header class="header">
        <h1>My Website</h1>
    </header>

    <!-- LEFT SIDEBAR -->
    <aside class="left">
        <h3>Menu</h3>
        <p>Home</p>
        <p>About</p>
        <p>Services</p>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <div class="box">

            <h2>Register</h2>
            <p class="subtitle">Create your account</p>

            <form>

                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <input type="password" placeholder="Confirm Password">

                <button type="submit">Sign Up</button>

            </form>

        </div>

    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="right">
        <h3>Info</h3>
        <p>Fast signup</p>
        <p>Secure login</p>
        <p>24/7 support</p>
    </aside>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 My Website</p>
    </footer>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodExpress Login</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
/* ===== GOOGLE FONT ===== */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ===== BODY ===== */

body{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url('https://images.unsplash.com/photo-1550547660-d9450f859349');

    background-size:cover;
    background-position:center;
}

/* ===== LOGIN CARD ===== */

.card{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(10px);

    padding:40px 30px;

    border-radius:22px;

    box-shadow:0 20px 50px rgba(0,0,0,0.35);

    text-align:center;
}

/* ===== LOGO ===== */

.logo{
    font-size:34px;
    font-weight:800;

    color:#ff4d4d;

    margin-bottom:10px;
}

/* ===== TITLE ===== */

.card h2{
    font-size:28px;
    color:#111;

    margin-bottom:8px;
}

.card p{
    color:#666;
    font-size:14px;

    margin-bottom:25px;
}

/* ===== INPUT BOX ===== */

.input-box{
    position:relative;

    margin-bottom:20px;
}

.input-box input{
    width:100%;

    padding:14px 14px 14px 50px;

    border:1px solid #ddd;
    border-radius:12px;

    background:#f8f8f8;

    outline:none;

    font-size:15px;

    transition:0.3s;
}

.input-box input:focus{
    border-color:#ff4d4d;

    box-shadow:0 0 8px rgba(255,77,77,0.2);
}

/* ===== ICONS ===== */

.input-box i{
    position:absolute;

    left:16px;
    top:50%;

    transform:translateY(-50%);

    color:#ff4d4d;

    font-size:18px;
}

/* ===== LOGIN BUTTON ===== */

.login-btn{
    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#ff4d4d,#e63939);

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-2px);

    box-shadow:0 8px 18px rgba(255,77,77,0.35);
}

/* ===== REGISTER LINK ===== */

.register-link{
    margin-top:22px;

    color:#666;
    font-size:14px;
}

.register-link a{
    color:#ff4d4d;

    text-decoration:none;

    font-weight:700;
}

.register-link a:hover{
    text-decoration:underline;
}

/* ===== RESPONSIVE ===== */

@media(max-width:480px){

    .card{
        padding:35px 25px;
    }

    .card h2{
        font-size:24px;
    }

    .logo{
        font-size:28px;
    }

}
</style>
</head>

<body>

<!-- LOGIN CARD -->

<div class="card">

    <!-- LOGO -->

    <div class="logo">
        🍔 FoodExpress
    </div>

    <!-- TITLE -->

    <h2>Welcome Back 👋</h2>

    <p>Login to continue ordering delicious food</p>

    <!-- FORM -->

<form action="index.html">

    <!-- EMAIL -->

    <div class="input-box">

        <i class="bi bi-envelope-fill"></i>

        <input type="email"
        placeholder="Enter your email"
        required>

    </div>

    <!-- PASSWORD -->

    <div class="input-box">

        <i class="bi bi-lock-fill"></i>

        <input type="password"
        placeholder="Enter your password"
        required>

    </div>

    <!-- LOGIN BUTTON -->

    <button type="submit" class="login-btn">
        Login
    </button>

</form>

    <!-- REGISTER -->

    <div class="register-link">

        Don't have an account?

        <a href="register.html">
            Create Account
        </a>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodExpress Cart</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */

.navbar{
    width:100%;
    background:white;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 12px rgba(0,0,0,0.08);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:30px;
    font-weight:700;
    color:#ff5a5f;
}

.logo i{
    color:#ffb400;
}

.navbar a{
    text-decoration:none;
    color:#333;
    margin-left:20px;
    font-weight:500;
}

.navbar a:hover{
    color:#ff5a5f;
}

/* PAGE */

.container{
    width:95%;
    max-width:1300px;
    margin:40px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

/* CART SECTION */

.cart-section{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.cart-title{
    font-size:32px;
    margin-bottom:25px;
    color:#222;
}

/* CART ITEM */

.cart-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    padding:20px 0;
    border-bottom:1px solid #eee;
}

.food-info{
    display:flex;
    align-items:center;
    gap:18px;
    flex:1;
}

.food-info img{
    width:130px;
    height:100px;
    object-fit:cover;
    border-radius:15px;
}

.food-name{
    font-size:22px;
    font-weight:600;
    margin-bottom:5px;
}

.food-price{
    color:#ff5a5f;
    font-size:20px;
    font-weight:700;
}

/* QTY */

.qty-box{
    display:flex;
    align-items:center;
    gap:12px;
}

.qty-box button{
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#ff5a5f;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.qty-box span{
    font-size:20px;
    font-weight:600;
}

/* REMOVE */

.remove-btn{
    border:none;
    background:black;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.remove-btn:hover{
    background:#ff5a5f;
}

/* SUMMARY */

.summary{
    background:white;
    border-radius:20px;
    padding:25px;
    height:fit-content;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.summary h2{
    margin-bottom:25px;
    color:#222;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
    font-size:18px;
}

.total{
    font-size:26px;
    font-weight:700;
    color:#ff5a5f;
}

.checkout-btn{
    width:100%;
    padding:16px;
    border:none;
    background:#ff5a5f;
    color:white;
    font-size:18px;
    border-radius:12px;
    margin-top:20px;
    cursor:pointer;
    transition:0.3s;
}

.checkout-btn:hover{
    background:black;
}

.empty{
    text-align:center;
    font-size:24px;
    padding:60px 0;
    color:#666;
}

/* RESPONSIVE */

@media(max-width:900px){

    .container{
        grid-template-columns:1fr;
    }

    .cart-item{
        flex-direction:column;
        align-items:flex-start;
    }

    .food-info{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
       🍔 FoodExpress
    </div>

    <div>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About US</a>
        <a href="cart.html">Cart</a>
    </div>

</div>

<!-- MAIN -->

<div class="container">

    <!-- CART -->

    <div class="cart-section">

        <h1 class="cart-title">🛒 Shopping Cart</h1>

        <div id="cartItems"></div>

    </div>

    <!-- SUMMARY -->

    <div class="summary">

        <h2>Order Summary</h2>

        <div class="summary-row">
            <span>Items</span>
            <span id="itemCount">0</span>
        </div>

        <div class="summary-row">
            <span>Delivery</span>
            <span>₹40</span>
        </div>

        <div class="summary-row total">
            <span>Total</span>
            <span>₹<span id="totalPrice">0</span></span>
        </div>

        <button class="checkout-btn" onclick="goToPayment()">
            Proceed To Checkout
        </button>
    </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

    let cartItems = document.getElementById("cartItems");

    cartItems.innerHTML = "";

    let total = 0;

    let itemCount = 0;

    if(cart.length === 0){

        cartItems.innerHTML = `
        <div class="empty">
            Your Cart Is Empty 😔
        </div>
        `;

        document.getElementById("totalPrice").innerText = 0;
        document.getElementById("itemCount").innerText = 0;

        return;
    }

    cart.forEach((item,index)=>{

        total += item.price * item.qty;

        itemCount += item.qty;

        cartItems.innerHTML += `

        <div class="cart-item">

            <div class="food-info">

                <img src="${item.image}">

                <div>
                    <div class="food-name">${item.name}</div>
                    <div class="food-price">₹${item.price}</div>
                </div>

            </div>

            <div class="qty-box">

                <button onclick="decreaseQty(${index})">-</button>

                <span>${item.qty}</span>

                <button onclick="increaseQty(${index})">+</button>

            </div>

            <button class="remove-btn"
            onclick="removeItem(${index})">
            Remove
            </button>

        </div>

        `;

    });

    document.getElementById("itemCount").innerText = itemCount;

    document.getElementById("totalPrice").innerText = total + 40;
}

function increaseQty(index){

    cart[index].qty++;

    updateCart();
}

function decreaseQty(index){

    if(cart[index].qty > 1){
        cart[index].qty--;
    }

    updateCart();
}

function removeItem(index){

    cart.splice(index,1);

    updateCart();
}

function updateCart(){

    localStorage.setItem("cart", JSON.stringify(cart));

    renderCart();
}

function goToPayment(){

    if(cart.length === 0){

        alert("Your cart is empty!");

        return;
    }

    window.location.href = "payment.html";
}

renderCart();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodExpress Payment</title>

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */

.navbar{
    width:100%;
    background:white;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.logo{
    font-size:30px;
    font-weight:700;
    color:#ff5a5f;
}

.navbar a{
    text-decoration:none;
    color:#333;
    margin-left:20px;
    font-weight:500;
    transition:0.3s;
}

.navbar a:hover{
    color:#ff5a5f;
}

/* MAIN CONTAINER */

.container{
    width:95%;
    max-width:1300px;
    margin:40px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

/* PAYMENT BOX */

.payment-box{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.payment-box h1{
    margin-bottom:25px;
    color:#222;
}

/* INPUTS */

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.input-group input,
.input-group textarea{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

.input-group input:focus,
.input-group textarea:focus{
    border-color:#ff5a5f;
}

/* ROW */

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* PAYMENT METHODS */

.methods{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-top:20px;
}

.method{
    border:2px solid #eee;
    padding:20px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.method:hover{
    border-color:#ff5a5f;
    transform:translateY(-5px);
}

.method.active{
    border-color:#ff5a5f;
    background:#fff3f3;
}

.method i{
    font-size:35px;
    color:#ff5a5f;
    margin-bottom:10px;
}

/* SUMMARY */

.summary{
    background:white;
    border-radius:20px;
    padding:25px;
    height:fit-content;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.summary h2{
    margin-bottom:25px;
}

.summary-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
    font-size:18px;
}

.total{
    font-size:28px;
    font-weight:700;
    color:#ff5a5f;
}

.place-order{
    width:100%;
    padding:16px;
    border:none;
    background:#ff5a5f;
    color:white;
    font-size:18px;
    border-radius:12px;
    margin-top:20px;
    cursor:pointer;
    transition:0.3s;
}

.place-order:hover{
    background:black;
}

/* RESPONSIVE */

@media(max-width:900px){

    .container{
        grid-template-columns:1fr;
    }

    .row{
        grid-template-columns:1fr;
    }

    .navbar{
        padding:18px 20px;
        flex-direction:column;
        gap:10px;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        🍔 FoodExpress
    </div>

    <div>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About Us</a>
        <a href="cart.html">Cart</a>
    </div>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

    <!-- PAYMENT SECTION -->

    <div class="payment-box">

        <h1>💳 Payment Details</h1>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Delivery Address</label>
            <textarea rows="4" placeholder="Enter delivery address"></textarea>
        </div>

        <div class="row">

            <div class="input-group">
                <label>City</label>
                <input type="text" placeholder="Enter city">
            </div>

            <div class="input-group">
                <label>Pincode</label>
                <input type="text" placeholder="Enter pincode">
            </div>

        </div>

        <!-- PAYMENT METHODS -->

        <h2 style="margin-top:25px;">Choose Payment Method</h2>

        <div class="methods">

            <!-- CARD -->

            <div class="method active" onclick="selectMethod(this)">
                <i class="fa-solid fa-credit-card"></i>
                <div>Card</div>
            </div>

            <!-- UPI -->

            <div class="method" onclick="selectMethod(this)">
                <i class="fa-brands fa-google-pay"></i>
                <div>UPI</div>
            </div>

            <!-- WALLET -->

            <div class="method" onclick="selectMethod(this)">
                <i class="fa-solid fa-wallet"></i>
                <div>Wallet</div>
            </div>

            <!-- CASH -->

            <div class="method" onclick="selectMethod(this)">
                <i class="fa-solid fa-money-bill-wave"></i>
                <div>Cash</div>
            </div>

        </div>

        <!-- PAYMENT FIELDS -->

        <div id="payment-fields" style="margin-top:30px;">

            <!-- CARD FIELDS -->

            <div id="card-fields">

                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456">
                </div>

                <div class="row">

                    <div class="input-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY">
                    </div>

                    <div class="input-group">
                        <label>CVV</label>
                        <input type="password" placeholder="***">
                    </div>

                </div>

            </div>

            <!-- UPI FIELD -->

            <div id="upi-field" style="display:none;">

                <div class="input-group">
                    <label>UPI ID</label>
                    <input type="text" placeholder="example@upi">
                </div>

            </div>

            <!-- WALLET FIELD -->

            <div id="wallet-field" style="display:none;">

                <div class="input-group">
                    <label>Wallet Number</label>
                    <input type="text" placeholder="Enter mobile number">
                </div>

            </div>

            <!-- CASH FIELD -->

            <div id="cash-field" style="display:none;">

                <p style="font-size:18px;color:green;font-weight:600;">
                    Cash on Delivery Available
                </p>

            </div>

        </div>

    </div>

    <!-- ORDER SUMMARY -->

    <div class="summary">

        <h2>Order Summary</h2>

        <div class="summary-item">
            <span>Items</span>
            <span id="items">0</span>
        </div>

        <div class="summary-item">
            <span>Delivery</span>
            <span>₹40</span>
        </div>

        <hr style="margin:20px 0;">

        <div class="summary-item total">
            <span>Total</span>
            <span>₹<span id="total">0</span></span>
        </div>

        <button class="place-order" onclick="placeOrder()">
            Place Order
        </button>

    </div>

</div>

<script>

/* GET CART */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let items = 0;

/* DEFAULT PAYMENT METHOD */

let paymentMethod = "Card";

/* CALCULATE TOTAL */

cart.forEach(item=>{

    total += item.price * item.qty;
    items += item.qty;

});

/* DELIVERY CHARGE */

total += 40;

/* SHOW DATA */

document.getElementById("items").innerText = items;
document.getElementById("total").innerText = total;

/* SELECT PAYMENT METHOD */

function selectMethod(element){

    let methods = document.querySelectorAll(".method");

    methods.forEach(method=>{
        method.classList.remove("active");
    });

    element.classList.add("active");

    paymentMethod = element.innerText.trim();

    /* ALL FIELDS */

    let cardFields = document.getElementById("card-fields");
    let upiField = document.getElementById("upi-field");
    let walletField = document.getElementById("wallet-field");
    let cashField = document.getElementById("cash-field");

    /* HIDE ALL */

    cardFields.style.display = "none";
    upiField.style.display = "none";
    walletField.style.display = "none";
    cashField.style.display = "none";

    /* SHOW SELECTED */

    if(paymentMethod === "Card"){

        cardFields.style.display = "block";

    }

    else if(paymentMethod === "UPI"){

        upiField.style.display = "block";

    }

    else if(paymentMethod === "Wallet"){

        walletField.style.display = "block";

    }

    else if(paymentMethod === "Cash"){

        cashField.style.display = "block";

    }

}

/* PLACE ORDER */

function placeOrder(){

    if(cart.length === 0){

        alert("Your cart is empty!");
        return;
    }

    alert(
        "🎉 Order Placed Successfully!\n\n" +
        "Payment Method: " + paymentMethod
    );

    /* SAVE PAYMENT METHOD */

    localStorage.setItem("paymentMethod", paymentMethod);

    /* CLEAR CART */

    localStorage.removeItem("cart");

    /* REDIRECT */

    window.location.href = "index.html";
}

</script>

</body>
</html>

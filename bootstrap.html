<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Page</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="pr-4.css">

<style>
.subtitle{
    text-align:center;
    color:#eca3a3;
    margin-bottom:15px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="container-fluid bg-dark text-white text-center p-3">
    <h1>My Website</h1>
</div>

<!-- MAIN GRID -->
<div class="container-fluid">

    <div class="row min-vh-100">

        <!-- LEFT SIDEBAR -->
        <aside class="col-md-2 bg-light p-4">

            <h3 class="mb-3">Menu</h3>

            <div class="list-group">

                <a href="#" class="list-group-item list-group-item-action">
                    Home
                </a>

                <a href="#" class="list-group-item list-group-item-action">
                    About
                </a>

                <a href="#" class="list-group-item list-group-item-action">
                    Services
                </a>

            </div>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="col-md-8 main d-flex justify-content-center align-items-center">

            <div class="box">

                <h2 class="text-center mb-2">Register</h2>

                <p class="subtitle">
                    Create your account
                </p>

                <form>

                    <input type="text"
                           class="form-control mb-3"
                           placeholder="Full Name">

                    <input type="email"
                           class="form-control mb-3"
                           placeholder="Email">

                    <input type="password"
                           class="form-control mb-3"
                           placeholder="Password">

                    <input type="password"
                           class="form-control mb-3"
                           placeholder="Confirm Password">

                    <button type="submit"
                            class="btn btn-primary w-100">
                        Sign Up
                    </button>

                </form>

            </div>

        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="col-md-2 bg-light p-4">

            <h3 class="mb-3">Info</h3>

            <div class="alert alert-success">
                Fast signup
            </div>

            <div class="alert alert-primary">
                Secure login
            </div>

            <div class="alert alert-warning">
                24/7 support
            </div>

        </aside>

    </div>

</div>

<!-- FOOTER -->
<div class="container-fluid bg-dark text-white text-center p-3">
    <p class="mb-0">© 2026 My Website</p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
